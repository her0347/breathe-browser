<!DOCTYPE html>
<html>
<head>
    <title>Breathe Browser</title>

    <style>
        body {
            background-color: #202124;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
        }

        img {
            width: 150px;
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 30px;
        }

        .search-box {
            width: 500px;
            max-width: 80%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            font-size: 18px;
            outline: none;
        }

        button {
            padding: 15px 25px;
            margin-left: 10px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .github-link {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .github-link:hover {
            opacity: 0.8;
        }

        .github-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>

<body>

    <a href="https://github.com/her0347/breathe-browser"
       target="_blank"
       rel="noopener noreferrer"
       class="github-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.17c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.69.08-.69 1.15.08 1.75 1.18 1.75 1.18 1.02 1.74 2.67 1.24 3.32.95.1-.74.4-1.24.73-1.52-2.55-.29-5.24-1.28-5.24-5.68 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.17a10.9 10.9 0 0 1 5.74 0c2.19-1.48 3.15-1.17 3.15-1.17.62 1.58.23 2.75.11 3.04.73.8 1.18 1.82 1.18 3.07 0 4.41-2.69 5.38-5.25 5.67.41.36.77 1.08.77 2.18v3.23c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"/>
        </svg>
        <span>GitHub</span>
    </a>

    <h1>breathe</h1>

    <img src="icon.png" alt="Logo">

    <br>

    <p>No bloat or tracking. Just you, and the web.</p>

    <input id="search"
           class="search-box"
           type="text"
           placeholder="Search the web..."
           onkeydown="if(event.key === 'Enter') search();">

    <button onclick="search()">Search</button>

    <script>
        function search() {
            let text = document.getElementById("search").value;

            if (text.trim() !== "") {
                window.location.href =
                    "https://duckduckgo.com/?q=" +
                    encodeURIComponent(text);
            }
        }
    </script>

</body>
</html>
